services:
  rpi-seism-api:
    build:
      context: ../..
      dockerfile: Dockerfile

    ports:
      - 8000:8000
    volumes:
      - ./usr_data:/usr_data  # Change ./data to the actual path of your data directory on the host ex: /home/user/rpi-seism/data/
      - ./data:/app/data
    restart: unless-stopped